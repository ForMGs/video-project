server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅: /watch/1 같은 모든 경로를 index.html로 돌려줌
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 리소스(이미지, JS, CSS 등)는 그대로 파일로 처리
    location /assets/ {
        try_files $uri $uri/ =404;
    }
}
